<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cariowns | Visuals</title>
    <link rel="icon" type="image/jpeg" href="favicon.jpg">
    <link rel="stylesheet" href="../style.css">
    <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>

    <header>
        <div class="logo">
            <a href="index.html" style="display: flex; align-items: center; text-decoration: none; gap: 15px;">
                <img src="assets/logo.png" alt="cariowns logo">
                <span style="font-size: 24px; font-weight: bold; letter-spacing: 1.5px; color: #ffffff;">cariowns</span>
            </a>
        </div>
        
        <button class="menu-toggle" aria-label="Toggle menu">&#9776;</button>

        <nav class="nav-links">
            <a href="index.html">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                Home
            </a>
            <a href="../MUSIC/">Music</a>
            <a href="./" class="active">Visuals</a> <!-- ACTIVE LINK -->
        </nav>
    </header>

    <main>
        <h1>Visual Art Gallery</h1>
        <p>Digital creations and photography.</p>

        <!-- Visuals Grid -->
        <div class="gallery-grid">
            <div class="gallery-item">
                <img src="assets/art1.jpg" alt="Artwork 1">
                <div class="gallery-overlay">Glitch Logo</div>
            </div>
            <div class="gallery-item">
                <img src="assets/art2.jpg" alt="Artwork 2">
                <div class="gallery-overlay">Nostalgic World</div>
            </div>
            <div class="gallery-item">
                <img src="assets/art3.jpg" alt="Artwork 3">
                <div class="gallery-overlay">Evening Village</div>
            </div>
            <div class="gallery-item">
                <img src="assets/art4.gif" alt="Artwork 4">
                <div class="gallery-overlay">Logo Animation</div>
            </div>
        </div>
    </main>

    <footer>
        <p>Support us in the creation of this website on <a href="https://github.com/ashiiqur/cariowns_alpha" target="_blank">GitHub</a>.</p>
        <p>&copy; 2026 cariowns. All rights reserved.</p>
    </footer>

    <script>
        const menuBtn = document.querySelector('.menu-toggle');
        const navLinks = document.querySelector('.nav-links');
        menuBtn.addEventListener('click', () => { navLinks.classList.toggle('active'); });
    </script>
</body>
</html>
