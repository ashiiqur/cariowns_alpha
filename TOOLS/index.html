<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cariowns | Tools</title>
    <link rel="icon" type="image/jpeg" href="favicon.jpg">
    <link rel="stylesheet" href="../style.css">
    <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>

    <header>
        <div class="logo">
            <a href="../" style="display: flex; align-items: center; text-decoration: none; gap: 15px;">
                <img src="assets/logo.png" alt="cariowns logo">
                <span style="font-size: 24px; font-weight: bold; letter-spacing: 1.5px; color: #ffffff;">cariowns</span>
            </a>
        </div>
        
        <button class="menu-toggle" aria-label="Toggle menu">&#9776;</button>

        <nav class="nav-links">
            <a href="../">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                <span class="hide-on-mobile">Home</span>
            </a>
            <a href="../MUSIC/">Music</a>
            <a href="../VISUALS/">Visuals</a>
            <a href="./" class="active">Tools</a>
            <a href="../ABOUT/">About</a>
        </nav>
    </header>

    <main>
        <h2>Tools & Resources</h2>
        <p>Custom tools created by cariowns.</p>

        <div class="tool-tabs">
            <button class="tab-btn active" onclick="openTab('audio-tools', this)">Audio</button>
            <button class="tab-btn" onclick="openTab('image-tools', this)">Image</button>
        </div>

        <div id="audio-tools" class="tool-section">
            <p style="color: #ff424d; font-size: 14px; font-weight: bold; letter-spacing: 3px; margin-top: 50px; text-transform: uppercase;">
                ( Coming Soon: Audio Tools )
            </p>
        </div>

        <div id="image-tools" class="tool-section" style="display: none;">
            <p style="color: #ff424d; font-size: 14px; font-weight: bold; letter-spacing: 3px; margin-top: 50px; text-transform: uppercase;">
                ( Coming Soon: Image Tools )
            </p>
        </div>
    </main>
    <footer>
        <p>This website is designed by <a href="https://instagram.com/ashiqur.sf" target="_blank">ashiqur</a>. Thank you for visiting this website.</p>
        <p>&copy; 2026 cariowns. All rights reserved.</p>
    </footer>

    <script>
        const menuBtn = document.querySelector('.menu-toggle');
        const navLinks = document.querySelector('.nav-links');
        menuBtn.addEventListener('click', () => { navLinks.classList.toggle('active'); });
    </script>
</body>
</html>
