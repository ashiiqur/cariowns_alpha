<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cariowns | Music</title>
    <link rel="icon" type="image/jpeg" href="favicon.jpg">
    <link rel="stylesheet" href="../style.css">
</head>
<body>

    <header>
        <div class="logo">
            <a href="index.html" style="display: flex; align-items: center; text-decoration: none; gap: 15px;">
                <img src="assets/logo.png" alt="cariowns logo">
                <span style="font-size: 24px; font-weight: bold; letter-spacing: 1.5px; color: #ffffff;">cariowns</span>
            </a>
        </div>
        
        <button class="menu-toggle" aria-label="Toggle menu">&#9776;</button>

        <nav class="nav-links">
    <!-- Points back to the main homepage -->
    <a href="../index.html">
        <svg>...</svg> Home
    </a>
    
    <!-- Points to itself (since it is already inside the MUSIC folder) -->
    <a href="index.html" class="active">MUSIC</a> 
    
    <!-- Points to the VISUALS folder -->
    <a href="../VISUALS/">VISUALS</a>
</nav>
    </header>

    <main>
        <h1>Latest Releases</h1>
        <p>Listen to the newest sounds from cariowns.</p>
        
        <!-- Music Grid -->
        <div class="music-grid">
            <!-- Track 1 -->
            <div class="music-card">
                <img src="assets/album1.jpg" alt="Album Art" class="album-art">
                <h3>Track Title 01</h3>
                <p>Produced by cariowns</p>
                <audio controls>
                    <source src="assets/track1.mp3" type="audio/mpeg">
                    Your browser does not support the audio element.
                </audio>
            </div>

            <!-- Track 2 -->
            <div class="music-card">
                <img src="assets/album2.jpg" alt="Album Art" class="album-art">
                <h3>Track Title 02</h3>
                <p>Produced by cariowns</p>
                <audio controls>
                    <source src="assets/track2.mp3" type="audio/mpeg">
                </audio>
            </div>
            
            <!-- Track 3 -->
            <div class="music-card">
                <img src="assets/album3.jpg" alt="Album Art" class="album-art">
                <h3>Track Title 03</h3>
                <p>Produced by cariowns</p>
                <audio controls>
                    <source src="assets/track3.mp3" type="audio/mpeg">
                </audio>
            </div>
        </div>
    </main>

    <footer>
        <p>Support us in the creation of this website on <a href="https://github.com/ashiiqur/cariowns_alpha" target="_blank">GitHub</a>.</p>
        <p>&copy; 2026 cariowns. All rights reserved.</p>
    </footer>

    <script>
        const menuBtn = document.querySelector('.menu-toggle');
        const navLinks = document.querySelector('.nav-links');
        menuBtn.addEventListener('click', () => { navLinks.classList.toggle('active'); });
    </script>
</body>
</html>
